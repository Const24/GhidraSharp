syntax = "proto3";

// GhidraSharp wire contract.
// One service, served by the Java GhidraSharpServer (Ghidra-as-library) and
// consumed by the C# Const24.GhidraSharp client. Keep this file the single
// source of truth: both sides generate from it, nobody hand-writes DTOs.
package ghidrasharp.v1;

option csharp_namespace = "Const24.GhidraSharp.Protocol";
option java_package = "io.github.const24.ghidrasharp.proto";
option java_multiple_files = true;
option java_outer_classname = "GhidraSharpProto";

// The bridged subset of Ghidra. Starts as a vertical slice (open a program,
// decompile a function) and grows one RPC at a time as RomForge needs it.
// Named *Service to avoid colliding with the Const24.GhidraSharp namespace on
// the generated C# side.
service GhidraSharpService {
  // Liveness + handshake. Returns the running Ghidra version so the client can
  // confirm it is talking to a real Ghidra without opening a program.
  rpc Ping(PingRequest) returns (PingReply);

  // Open (and, if needed, import + analyze) a program. The server holds it as
  // the current program for subsequent calls. Idempotent per (project, program).
  rpc OpenProgram(OpenProgramRequest) returns (OpenProgramReply);

  // Decompile a single function to C, identified by entry address or name.
  rpc DecompileFunction(DecompileRequest) returns (DecompileReply);

  // Batch decompile, streamed back one result at a time. One request decompiles
  // many functions inside the JVM, so the per-call gRPC round trip is paid once
  // instead of per function (the basis for competitive throughput vs pyghidra).
  rpc DecompileFunctions(DecompileFunctionsRequest) returns (stream DecompileReply);

  // List the functions in the current program. The returned set is meant to be
  // queried client-side (LINQ), so it carries enough per-function detail to
  // filter on without a round trip per function.
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsReply);

  // References (xrefs) whose TO-address is the given address: "who points here".
  rpc GetReferencesTo(ReferencesRequest) returns (ReferencesReply);

  // References (xrefs) originating FROM the given address: "what this points to".
  rpc GetReferencesFrom(ReferencesRequest) returns (ReferencesReply);

  // List symbols (names) in the program, optionally filtered by name.
  rpc ListSymbols(ListSymbolsRequest) returns (ListSymbolsReply);

  // Symbols defined at a specific address.
  rpc GetSymbolsAt(SymbolsAtRequest) returns (ListSymbolsReply);

  // Rename a symbol (persist a finding). Requires the program to be opened
  // writable; the change is in-memory unless the program is later saved.
  rpc RenameSymbol(RenameSymbolRequest) returns (RenameSymbolReply);

  // Read raw bytes from program memory.
  rpc ReadBytes(ReadBytesRequest) returns (ReadBytesReply);

  // Read the disassembled instructions Ghidra has at an address (the listing).
  rpc GetInstructions(InstructionsRequest) returns (InstructionsReply);

  // Full detail for one function: typed signature, parameters, locals, callers.
  rpc GetFunction(FunctionRequest) returns (FunctionDetailReply);

  // The defined data item at an address (type, length, value).
  rpc GetDataAt(DataAtRequest) returns (DataReply);

  // List data types known to the program (structs, enums, typedefs, ...).
  rpc ListDataTypes(DataTypesRequest) returns (DataTypesReply);

  // Apply a data type at an address (needs a writable program; in-memory unless saved).
  rpc ApplyDataType(ApplyDataTypeRequest) returns (DataReply);

  // Escape hatch: run a GhidraScript against the current program and capture its
  // output. Untyped by design — for the long tail the typed RPCs do not cover.
  rpc RunScript(RunScriptRequest) returns (RunScriptReply);

  // Import a binary into a NEW persistent Ghidra project on disk (.gpr/.rep),
  // analyze it, save it, and make it current. Reopen later via OpenProgram.
  rpc CreateProject(CreateProjectRequest) returns (OpenProgramReply);

  // Persist the current (writable, project-backed) program's changes to disk.
  rpc SaveProgram(SaveProgramRequest) returns (SaveProgramReply);

  // Comments at an address (all five Ghidra comment types).
  rpc GetComments(CommentsRequest) returns (CommentsReply);
  rpc SetComment(SetCommentRequest) returns (AckReply);

  // Bookmarks at an address.
  rpc GetBookmarks(BookmarksRequest) returns (BookmarksReply);
  rpc SetBookmark(SetBookmarkRequest) returns (AckReply);

  // One instruction in full: structured operands + raw PCode.
  rpc GetInstructionDetail(InstructionDetailRequest) returns (InstructionDetailReply);
}

message PingRequest {
  string message = 1;
}

message PingReply {
  string message = 1;
  string ghidra_version = 2;
}

message OpenProgramRequest {
  // A Ghidra project directory or .gpr file. If empty, the server uses a
  // scratch project under its own data dir.
  string project_path = 1;

  // Either a domain-file path inside the project (e.g. "/AG572"), or a path to
  // an importable binary on disk. The server decides based on whether it
  // already exists in the project.
  string program_path = 2;

  // Optional language/compiler-spec id used only when importing a raw binary
  // (e.g. "SuperH4:BE:32:default"). Ignored when opening an existing program.
  string language_id = 3;

  // Run auto-analysis after import. No-op when opening an already-analyzed
  // program.
  bool analyze = 4;

  // Open the program for modification (required for RenameSymbol). Default is
  // read-only, which keeps the source project untouched. Changes are never
  // auto-saved regardless.
  bool writable = 5;
}

message OpenProgramReply {
  bool success = 1;
  string program_name = 2;
  string language_id = 3;
  uint64 image_base = 4;
  uint32 function_count = 5;
  string error = 6;
}

message DecompileRequest {
  // Entry address as hex ("0x21e0") or decimal. Takes precedence over name.
  string address = 1;

  // Function name (e.g. "FUN_000021e0" or a user-applied name).
  string name = 2;

  // Decompiler timeout. 0 => server default.
  int32 timeout_seconds = 3;
}

message DecompileReply {
  bool success = 1;
  string c_code = 2;
  string signature = 3;
  string entry_address = 4;
  string error = 5;
}

message DecompileFunctionsRequest {
  // Entry addresses (hex) to decompile. Ignored when all=true.
  repeated string addresses = 1;

  // Decompile every function in the program (a whole-program sweep).
  bool all = 2;

  // Per-function decompiler timeout. 0 => server default.
  int32 timeout_seconds = 3;
}

message ListFunctionsRequest {
  // Populate FunctionInfo.calls (the callees of each function). Costs an extra
  // pass over the call graph, so it is opt-in.
  bool include_calls = 1;
}

message FunctionInfo {
  string name = 1;
  string entry_address = 2;
  uint64 size = 3;            // number of addresses in the function body
  int32 parameter_count = 4;
  bool is_thunk = 5;
  repeated string calls = 6;  // names of called functions (when include_calls)
}

message ListFunctionsReply {
  bool success = 1;
  repeated FunctionInfo functions = 2;
  string error = 3;
}

message ReferencesRequest {
  string address = 1;  // hex, e.g. "0x21e0"
}

message Reference {
  string from_address = 1;
  string to_address = 2;
  string reference_type = 3;  // Ghidra RefType name, e.g. "UNCONDITIONAL_CALL", "READ", "DATA"
  bool is_call = 4;
  bool is_jump = 5;
  bool is_data = 6;
  int32 operand_index = 7;    // operand the ref is on; -1 = mnemonic-level (CodeUnit.MNEMONIC)
  bool is_primary = 8;        // the primary reference from that from-address/operand
}

message ReferencesReply {
  bool success = 1;
  repeated Reference references = 2;
  string error = 3;
}

message ListSymbolsRequest {
  bool include_dynamic = 1;  // include Ghidra's auto-generated (dynamic) symbols, e.g. FUN_/DAT_/LAB_
  string name = 2;           // if set, only symbols with this exact name
}

message SymbolsAtRequest {
  string address = 1;  // hex
}

message GhidraSymbol {
  string name = 1;
  string address = 2;
  string symbol_type = 3;  // "Function", "Label", "Parameter", "Global", ...
  string source = 4;       // SourceType: "USER_DEFINED", "IMPORTED", "ANALYSIS", "DEFAULT"
  bool is_primary = 5;
  bool is_global = 6;
}

message ListSymbolsReply {
  bool success = 1;
  repeated GhidraSymbol symbols = 2;
  string error = 3;
}

message RenameSymbolRequest {
  // Target the primary symbol at this address, OR the symbol currently named
  // old_name (address wins if both are set).
  string address = 1;
  string old_name = 2;
  string new_name = 3;
}

message RenameSymbolReply {
  bool success = 1;
  string error = 2;
  string address = 3;
  string new_name = 4;
}

message ReadBytesRequest {
  string address = 1;  // hex
  int32 length = 2;    // number of bytes to read
}

message ReadBytesReply {
  bool success = 1;
  bytes data = 2;      // the bytes actually read (may be shorter at a block boundary)
  string address = 3;
  string error = 4;
}

message InstructionsRequest {
  string address = 1;        // start (hex)
  int32 max_instructions = 2; // 0 = the whole containing function (or a default cap)
}

message Instruction {
  string address = 1;
  string mnemonic = 2;        // e.g. "mov.l"
  string representation = 3;  // full instruction text, e.g. "mov.l @r4,r1"
  bytes raw_bytes = 4;        // the instruction's encoded bytes
  int32 length = 5;           // instruction length in bytes
}

message InstructionsReply {
  bool success = 1;
  repeated Instruction instructions = 2;
  string error = 3;
}

message FunctionRequest {
  string address = 1;        // entry (hex) ...
  string name = 2;           // ...or function name
  bool include_callers = 3;  // populate FunctionDetail.callers
}

message Variable {
  string name = 1;
  string data_type = 2;  // e.g. "int", "undefined4 *"
  string storage = 3;    // Ghidra VariableStorage text, e.g. "r4:4" or "Stack[-0x8]:4"
}

message FunctionDetail {
  string name = 1;
  string entry_address = 2;
  string signature = 3;            // full prototype string
  string return_type = 4;
  string calling_convention = 5;
  bool no_return = 6;
  bool varargs = 7;
  bool inline = 8;
  uint64 size = 9;
  repeated Variable parameters = 10;
  repeated Variable local_variables = 11;
  repeated string callers = 12;    // names of calling functions (when include_callers)
}

message FunctionDetailReply {
  bool success = 1;
  FunctionDetail function = 2;
  string error = 3;
}

message DataAtRequest {
  string address = 1;  // hex
}

message DataItem {
  string address = 1;
  string data_type = 2;       // display name, e.g. "float", "char[16]"
  int32 length = 3;
  string value = 4;           // Ghidra's default value representation
  bool is_pointer = 5;
  string pointer_target = 6;  // address pointed to, when is_pointer
  bool defined = 7;           // false when there is no defined data at the address
}

message DataReply {
  bool success = 1;
  DataItem data = 2;
  string error = 3;
}

message DataTypesRequest {
  string name_contains = 1;  // optional case-insensitive name filter
}

message DataTypeInfo {
  string name = 1;
  string display_name = 2;
  string path = 3;    // category path, e.g. "/MyStructs/Header"
  string kind = 4;    // Structure | Enum | TypeDef | Union | Pointer | Array | BuiltIn | Other
  int32 length = 5;   // -1 for dynamically-sized types
}

message DataTypesReply {
  bool success = 1;
  repeated DataTypeInfo data_types = 2;
  string error = 3;
}

message ApplyDataTypeRequest {
  string address = 1;
  string data_type = 2;  // name or path of the type to apply
}

message RunScriptRequest {
  string script_path = 1;     // path to a GhidraScript file (.java, .py, ...)
  repeated string args = 2;
}

message RunScriptReply {
  bool success = 1;
  string stdout = 2;
  string stderr = 3;
  string error = 4;
}

message CreateProjectRequest {
  string binary_path = 1;       // binary to import
  string project_location = 2;  // existing directory to create the project in
  string project_name = 3;      // project name => <location>/<name>.gpr + .rep
  string language_id = 4;       // optional language/compiler-spec id
  bool analyze = 5;
}

message SaveProgramRequest {
}

message SaveProgramReply {
  bool success = 1;
  string error = 2;
}

// Generic ack for small mutating calls.
message AckReply {
  bool success = 1;
  string error = 2;
}

message CommentsRequest {
  string address = 1;
}

message CommentsReply {
  bool success = 1;
  string address = 2;
  string eol = 3;
  string pre = 4;
  string post = 5;
  string plate = 6;
  string repeatable = 7;
  string error = 8;
}

message SetCommentRequest {
  string address = 1;
  string type = 2;     // EOL | PRE | POST | PLATE | REPEATABLE
  string comment = 3;  // empty clears it
}

message BookmarksRequest {
  string address = 1;
}

message Bookmark {
  string address = 1;
  string type = 2;
  string category = 3;
  string comment = 4;
}

message BookmarksReply {
  bool success = 1;
  repeated Bookmark bookmarks = 2;
  string error = 3;
}

message SetBookmarkRequest {
  string address = 1;
  string type = 2;      // bookmark type (e.g. "Note")
  string category = 3;
  string comment = 4;
}

message InstructionDetailRequest {
  string address = 1;
}

message Operand {
  int32 index = 1;
  string representation = 2;  // e.g. "@r4", "0x10"
  string type = 3;           // OperandType flags as text
  string register = 4;       // register name, if a register operand
  bool has_scalar = 5;
  int64 scalar = 6;          // scalar value, when has_scalar
}

message PcodeOp {
  string mnemonic = 1;        // e.g. "COPY", "INT_ADD", "LOAD"
  string output = 2;          // output varnode, or empty
  repeated string inputs = 3; // input varnodes
}

message InstructionDetail {
  string address = 1;
  string mnemonic = 2;
  string representation = 3;
  bytes raw_bytes = 4;
  int32 length = 5;
  repeated Operand operands = 6;
  repeated PcodeOp pcode = 7;
}

message InstructionDetailReply {
  bool success = 1;
  InstructionDetail instruction = 2;
  string error = 3;
}
