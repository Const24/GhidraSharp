syntax = "proto3";

// GhidraSharp wire contract.
// One service, served by the Java GhidraSharpServer (Ghidra-as-library) and
// consumed by the C# Const24.GhidraSharp client. Keep this file the single
// source of truth: both sides generate from it, nobody hand-writes DTOs.
package ghidrasharp.v1;

option csharp_namespace = "Const24.GhidraSharp.Protocol";
option java_package = "io.github.const24.ghidrasharp.proto";
option java_multiple_files = true;
option java_outer_classname = "GhidraSharpProto";

// The bridged subset of Ghidra. Starts as a vertical slice (open a program,
// decompile a function) and grows one RPC at a time as RomForge needs it.
// Named *Service to avoid colliding with the Const24.GhidraSharp namespace on
// the generated C# side.
service GhidraSharpService {
  // Liveness + handshake. Returns the running Ghidra version so the client can
  // confirm it is talking to a real Ghidra without opening a program.
  rpc Ping(PingRequest) returns (PingReply);

  // Open (and, if needed, import + analyze) a program. The server holds it as
  // the current program for subsequent calls. Idempotent per (project, program).
  rpc OpenProgram(OpenProgramRequest) returns (OpenProgramReply);

  // Decompile a single function to C, identified by entry address or name.
  rpc DecompileFunction(DecompileRequest) returns (DecompileReply);

  // Batch decompile, streamed back one result at a time. One request decompiles
  // many functions inside the JVM, so the per-call gRPC round trip is paid once
  // instead of per function (the basis for competitive throughput vs pyghidra).
  rpc DecompileFunctions(DecompileFunctionsRequest) returns (stream DecompileReply);

  // List the functions in the current program. The returned set is meant to be
  // queried client-side (LINQ), so it carries enough per-function detail to
  // filter on without a round trip per function.
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsReply);

  // References (xrefs) whose TO-address is the given address: "who points here".
  rpc GetReferencesTo(ReferencesRequest) returns (ReferencesReply);

  // References (xrefs) originating FROM the given address: "what this points to".
  rpc GetReferencesFrom(ReferencesRequest) returns (ReferencesReply);

  // List symbols (names) in the program, optionally filtered by name.
  rpc ListSymbols(ListSymbolsRequest) returns (ListSymbolsReply);

  // Symbols defined at a specific address.
  rpc GetSymbolsAt(SymbolsAtRequest) returns (ListSymbolsReply);

  // Rename a symbol (persist a finding). Requires the program to be opened
  // writable; the change is in-memory unless the program is later saved.
  rpc RenameSymbol(RenameSymbolRequest) returns (RenameSymbolReply);
}

message PingRequest {
  string message = 1;
}

message PingReply {
  string message = 1;
  string ghidra_version = 2;
}

message OpenProgramRequest {
  // A Ghidra project directory or .gpr file. If empty, the server uses a
  // scratch project under its own data dir.
  string project_path = 1;

  // Either a domain-file path inside the project (e.g. "/AG572"), or a path to
  // an importable binary on disk. The server decides based on whether it
  // already exists in the project.
  string program_path = 2;

  // Optional language/compiler-spec id used only when importing a raw binary
  // (e.g. "SuperH4:BE:32:default"). Ignored when opening an existing program.
  string language_id = 3;

  // Run auto-analysis after import. No-op when opening an already-analyzed
  // program.
  bool analyze = 4;

  // Open the program for modification (required for RenameSymbol). Default is
  // read-only, which keeps the source project untouched. Changes are never
  // auto-saved regardless.
  bool writable = 5;
}

message OpenProgramReply {
  bool success = 1;
  string program_name = 2;
  string language_id = 3;
  uint64 image_base = 4;
  uint32 function_count = 5;
  string error = 6;
}

message DecompileRequest {
  // Entry address as hex ("0x21e0") or decimal. Takes precedence over name.
  string address = 1;

  // Function name (e.g. "FUN_000021e0" or a user-applied name).
  string name = 2;

  // Decompiler timeout. 0 => server default.
  int32 timeout_seconds = 3;
}

message DecompileReply {
  bool success = 1;
  string c_code = 2;
  string signature = 3;
  string entry_address = 4;
  string error = 5;
}

message DecompileFunctionsRequest {
  // Entry addresses (hex) to decompile. Ignored when all=true.
  repeated string addresses = 1;

  // Decompile every function in the program (a whole-program sweep).
  bool all = 2;

  // Per-function decompiler timeout. 0 => server default.
  int32 timeout_seconds = 3;
}

message ListFunctionsRequest {
  // Populate FunctionInfo.calls (the callees of each function). Costs an extra
  // pass over the call graph, so it is opt-in.
  bool include_calls = 1;
}

message FunctionInfo {
  string name = 1;
  string entry_address = 2;
  uint64 size = 3;            // number of addresses in the function body
  int32 parameter_count = 4;
  bool is_thunk = 5;
  repeated string calls = 6;  // names of called functions (when include_calls)
}

message ListFunctionsReply {
  bool success = 1;
  repeated FunctionInfo functions = 2;
  string error = 3;
}

message ReferencesRequest {
  string address = 1;  // hex, e.g. "0x21e0"
}

message Reference {
  string from_address = 1;
  string to_address = 2;
  string reference_type = 3;  // Ghidra RefType name, e.g. "UNCONDITIONAL_CALL", "READ", "DATA"
  bool is_call = 4;
  bool is_jump = 5;
  bool is_data = 6;
  int32 operand_index = 7;    // operand the ref is on; -1 = mnemonic-level (CodeUnit.MNEMONIC)
  bool is_primary = 8;        // the primary reference from that from-address/operand
}

message ReferencesReply {
  bool success = 1;
  repeated Reference references = 2;
  string error = 3;
}

message ListSymbolsRequest {
  bool include_dynamic = 1;  // include Ghidra's auto-generated (dynamic) symbols, e.g. FUN_/DAT_/LAB_
  string name = 2;           // if set, only symbols with this exact name
}

message SymbolsAtRequest {
  string address = 1;  // hex
}

message GhidraSymbol {
  string name = 1;
  string address = 2;
  string symbol_type = 3;  // "Function", "Label", "Parameter", "Global", ...
  string source = 4;       // SourceType: "USER_DEFINED", "IMPORTED", "ANALYSIS", "DEFAULT"
  bool is_primary = 5;
  bool is_global = 6;
}

message ListSymbolsReply {
  bool success = 1;
  repeated GhidraSymbol symbols = 2;
  string error = 3;
}

message RenameSymbolRequest {
  // Target the primary symbol at this address, OR the symbol currently named
  // old_name (address wins if both are set).
  string address = 1;
  string old_name = 2;
  string new_name = 3;
}

message RenameSymbolReply {
  bool success = 1;
  string error = 2;
  string address = 3;
  string new_name = 4;
}
