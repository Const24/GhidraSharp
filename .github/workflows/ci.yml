name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Fast tier: the C# unit + contract tests. No Ghidra, no JVM — runs anywhere.
  # This is the status badge.
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Unit + contract tests
        run: dotnet test tests/GhidraSharp.Tests --filter "Category!=Integration"

  # Full tier: Java service tests, the C# integration tests, and the pyghidra
  # parity acceptance — all need a real Ghidra. Manual (heavy Ghidra download).
  full:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ghidra (latest public release)
        run: |
          url=$(curl -fsSL https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/latest \
                | grep browser_download_url | grep -o 'https://[^"]*PUBLIC[^"]*\.zip' | head -1)
          echo "Downloading $url"
          curl -fsSL -o ghidra.zip "$url"
          unzip -q ghidra.zip
          echo "GHIDRA_INSTALL_DIR=$(echo "$PWD"/ghidra_*_PUBLIC)" >> "$GITHUB_ENV"

      - name: Install pyghidra
        run: pip install pyghidra

      - name: Java service tests + launch argfile
        run: cd server && ./gradlew test writeServerArgs --console=plain

      - name: C# integration tests (real Ghidra)
        run: dotnet test tests/GhidraSharp.Tests --filter "Category=Integration"

      - name: Acceptance — parity vs pyghidra
        run: python bench/verify.py --no-risc
